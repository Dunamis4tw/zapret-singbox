{
	"dns": {
	  "servers": [
	      {
			"type": "https",
			"server": "1.1.1.1",
			"tag": "dns_1111"
		  }
	  ]
	},
  "log": {
    "level": "trace",
    "output": "/opt/sing-box/logs/sing-box.log",
    "timestamp": true
  },
  "inbounds": [
    {
      "type": "mixed",
      "tag": "mixed-in",
      "listen": "0.0.0.0",
      "listen_port": 7890
    }
  ],
  "outbounds": [
    {
      "type": "direct",
      "tag": "direct",
	  "domain_resolver": "dns_1111"
    }
  ],
  "route": {
    "auto_detect_interface": true,
    "rules": [
      {
        "protocol": "dns",
        "outbound": "direct"
      }
    ],
    "final": "direct",
    "default_domain_resolver": "dns_1111"
  }
}

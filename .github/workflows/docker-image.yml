name: Build & Push Docker Image

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]          # триггер на теги вида v1.0.0
  pull_request:
    branches: [ "main" ]

env:
  IMAGE_NAME: zapret-singbox

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # нужно для публикации в GitHub Packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # автоматически, ничего настраивать не нужно

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch          # main → :main
            type=semver,pattern={{version}} # v1.2.3 → :1.2.3
            type=semver,pattern={{major}}.{{minor}}  # → :1.2
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}  # не пушить при PR
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha    # кэш между запусками — сборка быстрее
          cache-to: type=gha,mode=max
          build-args: |
            ZAPRET_VERSION=v72.10
            SINGBOX_VERSION=1.13.0
